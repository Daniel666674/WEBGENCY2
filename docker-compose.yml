services:
  crm:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persist database outside container
      - ./data:/app/data
      # Persist user config
      - ./crm-config.json:/app/crm-config.json
    environment:
      - NODE_ENV=production
    # All secrets (auth, email digest, etc.) live in a .env file next to this
    # compose file — NOT hardcoded here, since this file is committed to git.
    # Copy .env.example to .env and fill it in before first `docker compose up`.
    # CRM_USERNAME / CRM_PASSWORD / SESSION_SECRET are REQUIRED — without them
    # the login gate fails closed and nobody (including you) can get in.
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
